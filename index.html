    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        :root {
            --primary: #2C3E50;
            --secondary: #3498DB;
            --accent: #1ABC9C;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2C3E50;
            --text-light: #6B7A8D;
            --border: #E2E8F0;
            --danger: #E74C3C;
            --warning: #F39C12;
            --success: #27AE60;
        }
        body { background: var(--bg); color: var(--text); }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 3px; }

        /* === NAVBAR === */
        .navbar { background: #fff; border-bottom: 1px solid var(--border); }
        .nav-logo-icon { background: var(--primary); width: 36px; height: 36px; border-radius: 8px; display:flex; align-items:center; justify-content:center; }
        .nav-link { color: var(--text-light); font-size: 15px; font-weight: 500; padding: 6px 0; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--secondary); border-bottom-color: var(--secondary); }

        /* === BUTTONS === */
        .btn-primary { background: var(--secondary); color: #fff; border-radius: 8px; padding: 10px 20px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: background 0.2s, box-shadow 0.2s; }
        .btn-primary:hover { background: #2980B9; box-shadow: 0 4px 12px rgba(52,152,219,0.3); }
        .btn-outline { background: transparent; color: var(--secondary); border: 1.5px solid var(--secondary); border-radius: 8px; padding: 9px 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn-outline:hover { background: #EBF5FB; }
        .btn-accent { background: var(--accent); color: #fff; border-radius: 8px; padding: 10px 20px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: background 0.2s; }
        .btn-accent:hover { background: #17A589; }
        .btn-danger { background: var(--danger); color: #fff; border-radius: 8px; padding: 8px 16px; font-weight: 600; font-size: 13px; border: none; cursor: pointer; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }

        /* === CARDS === */
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(44,62,80,0.08); }
        .card-hover { transition: box-shadow 0.2s, transform 0.2s; cursor: pointer; }
        .card-hover:hover { box-shadow: 0 8px 24px rgba(44,62,80,0.12); transform: translateY(-2px); }

        /* === FORMS === */
        .form-label { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; display: block; }
        .form-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: #fff; transition: border-color 0.2s; outline: none; }
        .form-input:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
        .form-select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: #fff; cursor: pointer; outline: none; }
        .form-select:focus { border-color: var(--secondary); }

        /* === BADGES === */
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-blue { background: #EBF5FB; color: var(--secondary); }
        .badge-green { background: #EAFAF1; color: var(--success); }
        .badge-orange { background: #FEF9E7; color: var(--warning); }
        .badge-red { background: #FDEDEC; color: var(--danger); }
        .badge-teal { background: #E8F8F5; color: var(--accent); }
        .badge-dark { background: #EBF0F5; color: var(--primary); }

        /* === STAT CARDS === */
        .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .subject-literature { background: #FEF9E7; color: #D35400; }
        .subject-english { background: #EBF5FB; color: #1A5276; }
        .subject-geography { background: #E8F8F5; color: #16A085; }
        .subject-literature { background: #FEF9E7; color: #D35400; }
        .subject-cs { background: #F0F3F4; color: var(--primary); }

        .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }

        .tab-btn { padding: 10px 18px; font-size: 14px; font-weight: 500; color: var(--text-light); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }

        .hero-accent { color: var(--accent); }

        #chatWidget { position: fixed; bottom: 24px; right: 24px; z-index: 1000; }

        #chatBubble:hover { background: #2980B9; }
        #chatWindow { width: 340px; height: 460px; background: #fff; border-radius: 14px; box-shadow: 0 8px 32px rgba(44,62,80,0.18); display: none; flex-direction: column; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
        #chatWindow.open { display: flex; }
        .chat-header { background: var(--primary); color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { max-width: 82%; padding: 10px 13px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; }
        .chat-msg.bot { background: #EBF5FB; color: var(--text); align-self: flex-start; border-radius: 10px 10px 10px 2px; }
        .chat-msg.user { background: var(--secondary); color: #fff; align-self: flex-end; border-radius: 10px 10px 2px 10px; }
        .chat-msg.thinking { background: #F0F3F4; color: var(--text-light); align-self: flex-start; font-style: italic; }
        .chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
        .chat-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
        .chat-input:focus { border-color: var(--secondary); }
        .chat-send { background: var(--secondary); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; }
        .chat-send:hover { background: #2980B9; }

        /* === ANSWER OPTIONS === */
        .answer-option { padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 10px; font-size: 15px; }
        .answer-option:hover { border-color: var(--secondary); background: #EBF5FB; }
        .answer-option.selected { border-color: var(--secondary); background: #EBF5FB; }
        .answer-option.correct { border-color: var(--success); background: #EAFAF1; }
        .answer-option.wrong { border-color: var(--danger); background: #FDEDEC; }

        /* === TABLES === */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: #F8F9FA; padding: 11px 14px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-light); border-bottom: 1.5px solid var(--border); }
        .data-table td { padding: 13px 14px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .data-table tr:hover td { background: #F8F9FA; }
        .data-table tr:last-child td { border-bottom: none; }

        /* === DIVIDERS === */
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-light); text-transform: uppercase; }

        /* === TOAST === */
        .toast { position: fixed; bottom: 90px; right: 24px; background: var(--primary); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }

        /* === SUBJECT FILTERS === */
        .filter-chip { padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 500; background: #EBF0F5; color: var(--text); border: none; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .filter-chip:hover { background: #D6EAF8; color: var(--secondary); }
        .filter-chip.active { background: var(--secondary); color: #fff; }

        /* === LESSON CONTENT === */
        .lesson-body h2 { font-size: 22px; font-weight: 700; margin: 24px 0 12px; }
        .lesson-body h3 { font-size: 18px; font-weight: 600; margin: 20px 0 8px; color: var(--secondary); }
        .lesson-body p { margin-bottom: 14px; line-height: 1.7; }
        .lesson-body ul, .lesson-body ol { margin: 10px 0 16px 20px; }
        .lesson-body li { margin-bottom: 6px; line-height: 1.6; }
        .lesson-body .formula { background: #F8F9FA; border-left: 3px solid var(--secondary); padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 14px 0; font-family: 'Courier New', monospace; font-size: 15px; }
        .lesson-body table { width: 100%; border-collapse: collapse; margin: 14px 0; }
        .lesson-body table th { background: var(--primary); color: #fff; padding: 9px 12px; font-size: 13px; }
        .lesson-body table td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .lesson-body table tr:nth-child(even) td { background: #F8F9FA; }
        .example-block { background: #F0FFF4; border: 1px solid #A9DFBF; border-radius: 8px; padding: 14px 16px; margin: 14px 0; }
        .example-block strong { color: var(--success); display: block; margin-bottom: 6px; font-size: 13px; }

        /* === SIDEBAR === */
        .sidebar-lesson { padding: 10px 14px; border-radius: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; transition: background 0.15s; }
        .sidebar-lesson:hover { background: #EBF5FB; }
        .sidebar-lesson.active { background: #D6EAF8; color: var(--secondary); font-weight: 600; }
        .sidebar-lesson.done .lesson-num { background: var(--success); color: #fff; }
        .lesson-num { width: 26px; height: 26px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: var(--text-light); }
        .lesson-num.active-num { background: var(--secondary); color: #fff; }

        /* === MISC === */
        .page-hidden { display: none !important; }
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-light); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
        .tag { display: inline-block; padding: 3px 8px; background: #EBF0F5; border-radius: 4px; font-size: 12px; color: var(--text-light); margin: 2px; }

        /* === ADMIN SIDEBAR === */
        .admin-nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--text-light); cursor: pointer; transition: background 0.15s; border: none; background: transparent; width: 100%; }
        .admin-nav-item:hover { background: #EBF5FB; color: var(--secondary); }
        .admin-nav-item.active { background: #D6EAF8; color: var(--secondary); }

        /* === ANIMATIONS (minimal, no float/pulse) === */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { min-height: auto; padding: 60px 0; }
            #chatWindow { width: 300px; height: 400px; }
        }
    </style>
</head>

// ===========================================================

const COURSES = [
    {
        id:'math5', title:'Математика 5-6 класс', subject:'math', grade:'5-6', difficulty:'beginner',
        description:'Дроби, проценты, пропорции, основные операции с числами', icon:'fa-calculator', colorClass:'subject-math',
        rating:4.8, totalStudents:2341,
        lessons:[
            {
                id:'m5_1', title:'Натуральные числа и действия с ними', order:1, estimatedTime:25,
                theory:`<h2>Натуральные числа</h2>
<p>Натуральные числа — это числа, которые возникли естественным образом при счёте предметов: 1, 2, 3, 4, 5, ...</p>
<p>Ноль <strong>не является</strong> натуральным числом, но входит в множество целых чисел.</p>
<h3>Основные свойства сложения</h3>
<ul>
<li><strong>Переместительное:</strong> a + b = b + a (от перестановки слагаемых сумма не меняется)</li>
<li><strong>Сочетательное:</strong> (a + b) + c = a + (b + c)</li>
</ul>
<div class="formula">Пример: 25 + 37 + 15 = 25 + 15 + 37 = 40 + 37 = 77</div>
<h3>Основные свойства умножения</h3>
<ul>
<li><strong>Переместительное:</strong> a × b = b × a</li>
<li><strong>Сочетательное:</strong> (a × b) × c = a × (b × c)</li>
<li><strong>Распределительное:</strong> a × (b + c) = a × b + a × c</li>
</ul>
<div class="example-block"><strong>📌 Пример</strong>17 × 4 = 17 × (2 + 2) = 17 × 2 + 17 × 2 = 34 + 34 = 68</div>
<h3>Делимость чисел</h3>
<p>Число делится на 2, если оно чётное (оканчивается на 0, 2, 4, 6, 8).<br>
На 3 — если сумма цифр делится на 3.<br>
На 5 — если оканчивается на 0 или 5.<br>
На 10 — если оканчивается на 0.</p>
<table><tr><th>Признак</th><th>Пример</th></tr>
<tr><td>Делится на 2</td><td>84 (чётное)</td></tr>
<tr><td>Делится на 3</td><td>135: 1+3+5=9, делится на 3</td></tr>
<tr><td>Делится на 5</td><td>125 (оканчивается на 5)</td></tr>
</table>`,
                quiz:[
                    {q:'Сколько будет 24 × 5?', answers:['100','110','120','130'], correct:2},
                    {q:'Какое из чисел делится на 3?', answers:['124','127','129','131'], correct:2},
                    {q:'Переместительное свойство сложения: а + b = ?', answers:['b + a','a − b','a × b','b − a'], correct:0},
                    {q:'Число 450 делится на:', answers:['Только на 2','Только на 5','На 2, 5 и 10','На 3 и 7'], correct:2},
                    {q:'Вычислите: 15 × (3 + 7)', answers:['45','100','150','75'], correct:2}
                ]
            },
            {
                id:'m5_2', title:'Обыкновенные дроби', order:2, estimatedTime:30,
                theory:`<h2>Обыкновенные дроби</h2>
<p>Дробь — это запись числа в виде <strong>a/b</strong>, где a — числитель (сколько частей взяли), b — знаменатель (на сколько частей поделили целое).</p>
<div class="formula">3/4 — три четверти (взяли 3 части из 4)</div>
<h3>Виды дробей</h3>
<ul>
<li><strong>Правильная дробь:</strong> числитель меньше знаменателя (3/5, 7/10)</li>
<li><strong>Неправильная дробь:</strong> числитель ≥ знаменателя (7/3, 5/2)</li>
<li><strong>Смешанное число:</strong> 2½ = 2 + 1/2 = 5/2</li>
</ul>
<h3>Сложение и вычитание дробей</h3>
<p>С одинаковым знаменателем: складываем/вычитаем числители.</p>
<div class="formula">3/7 + 2/7 = (3+2)/7 = 5/7</div>
<p>С разными знаменателями: приводим к общему знаменателю (НОК).</p>
<div class="formula">1/3 + 1/4 = 4/12 + 3/12 = 7/12</div>
<h3>Умножение и деление</h3>
<div class="formula">a/b × c/d = (a×c)/(b×d)</div>
<div class="formula">a/b ÷ c/d = a/b × d/c</div>
<div class="example-block"><strong>📌 Пример</strong>2/3 ÷ 4/5 = 2/3 × 5/4 = 10/12 = 5/6</div>`,

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}
function setNavActive(page) {
    document.querySelectorAll('[data-nav]').forEach(el => {
        el.classList.toggle('active', el.dataset.nav === page);
    });
}

// ===========================================================
//  NAVIGATION
// ===========================================================
function navigate(page, param) {
    currentPage = page;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setNavActive(page);
    const app = document.getElementById('appContainer');
    switch (page) {
        case 'index':     app.innerHTML = renderIndex(); break;
        case 'courses':   app.innerHTML = renderCourses(param); break;
        case 'course':    app.innerHTML = renderCoursePage(param); loadCourseRealStudents(param); break;
        case 'lesson':    app.innerHTML = renderLesson(param); break;
        case 'login':     app.innerHTML = renderLogin(); break;
        case 'register':  app.innerHTML = renderRegister(); break;
        case 'dashboard': renderDashboard(); break;
        case 'teacher':   renderTeacherDashboard(); break;
        case 'admin':     app.innerHTML = renderAdmin(); loadAdminData(); break;
        case 'about':     app.innerHTML = renderAbout(); break;
        default:          app.innerHTML = renderIndex();
    }
    updateAuthUI();
}

// Render index immediately on page load (fix white screen)
document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('appContainer');
    if (app) app.innerHTML = renderIndex();
    updateAuthUI();
});

// Auth state observer — fires after Firebase resolves
let authResolved = false;
auth.onAuthStateChanged(async user => {
    currentUser = user || null;
    currentUserData = null;
    if (user) {
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) currentUserData = doc.data();
        } catch(e) {}
    }
    if (!authResolved) {
        authResolved = true;
        if (user) {
            if (user.email === 'admin@eduaipro.com') navigate('admin');
            else if (currentUserData?.role === 'teacher') navigate('teacher');
            else navigate('dashboard');
        } else {
            updateAuthUI();
        }
    } else {
        updateAuthUI();
    }
});

// ===========================================================

    const area = document.getElementById('authArea');
    const navDash = document.getElementById('navDashboard');

    if (!area) return;

        const isAdmin = currentUser.email === 'admin@eduaipro.com';
        if (navDash) {
            navDash.classList.remove('page-hidden');

        }
        if (chatW) chatW.classList.remove('page-hidden');
        area.innerHTML = `

                    ${isAdmin ? '<button onclick="navigate(\'admin\');closeUserMenu()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 flex items-center gap-2" style="border:none;background:transparent;cursor:pointer;color:var(--danger)"><i class="fas fa-shield-alt"></i> Админ-панель</button>' : ''}
                    <hr style="border-color:var(--border);margin:4px 0;">

function toggleUserMenu() {
    document.getElementById('userMenu')?.classList.toggle('hidden');
}
function goToMyDashboard() {
    navigate(currentUserData?.role === 'teacher' ? 'teacher' : 'dashboard');
}
function closeUserMenu() {
    document.getElementById('userMenu')?.classList.add('hidden');
}
document.addEventListener('click', e => {
    const menu = document.getElementById('userMenu');
    if (menu && !e.target.closest('[onclick*="toggleUserMenu"]') && !menu.contains(e.target)) {
        menu.classList.add('hidden');
    }
});

async function doLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Вход...';
    try {
        const cred = await auth.signInWithEmailAndPassword(email, pass);
        currentUser = cred.user;
        try {
            const doc = await db.collection('users').doc(cred.user.uid).get();
            if (doc.exists) currentUserData = doc.data();
        } catch(e) {}
        updateAuthUI();
        if (email === 'admin@eduaipro.com') navigate('admin');
        else if (currentUserData?.role === 'teacher') navigate('teacher');
        else navigate('dashboard');
        showToast('Добро пожаловать!');
    } catch (err) {
        document.getElementById('loginError').textContent = 'Неверный email или пароль.';
        btn.disabled = false; btn.textContent = 'Войти';
    }
}
function generateTeacherCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function doRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    const role = document.getElementById('regRole')?.value || 'student';
    const grade = document.getElementById('regGrade')?.value || '';
    const teacherCodeInput = (document.getElementById('regTeacherCode')?.value || '').trim().toUpperCase();
    const subject = document.getElementById('regSubject')?.value || '';
    const errEl = document.getElementById('regError');
    if (pass !== pass2) { errEl.textContent = 'Пароли не совпадают.'; return; }
    if (pass.length < 6) { errEl.textContent = 'Пароль не менее 6 символов.'; return; }
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Регистрация...';
    try {
        // If student entered a teacher code, validate it first
        let teacherUid = null;
        if (role === 'student' && teacherCodeInput) {
            const codeSnap = await db.collection('teacherCodes').doc(teacherCodeInput).get();
            if (!codeSnap.exists) {
                errEl.textContent = 'Код преподавателя не найден. Проверьте правильность кода.';
                btn.disabled = false; btn.textContent = 'Зарегистрироваться'; return;
            }
            teacherUid = codeSnap.data().teacherUid;
        }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        const userData = {
            uid: cred.user.uid, name, email,
            role: role === 'teacher' ? 'teacher' : 'student',
            grade: grade ? parseInt(grade) : null,
            createdAt: new Date().toISOString(),
            statistics: { totalCourses:0, completedLessons:0, averageScore:0 }
        };
        let code = null;
        if (role === 'teacher') {
            // Generate unique teacher code
            let attempts = 0;
            do {
                code = generateTeacherCode();
                const existing = await db.collection('teacherCodes').doc(code).get();
                if (!existing.exists) break;
                attempts++;
            } while (attempts < 10);
            userData.teacherCode = code;
            userData.subject = subject;
            userData.students = [];
        }
        if (role === 'student' && teacherUid) {
            userData.teacherUid = teacherUid;
            userData.teacherCode = teacherCodeInput;
        }
        // Save the user's own profile first, so the account is always usable
        // even if a secondary write below were to fail.
        await db.collection('users').doc(cred.user.uid).set(userData);
        if (role === 'teacher') {
            // Save code to lookup collection
            await db.collection('teacherCodes').doc(code).set({ teacherUid: cred.user.uid, teacherName: name, subject, createdAt: new Date().toISOString() });
        }
        if (role === 'student' && teacherUid) {
            // Add student to teacher's list
            await db.collection('users').doc(teacherUid).update({
                students: firebase.firestore.FieldValue.arrayUnion(cred.user.uid)
            });
        }
        currentUser = cred.user;
        currentUserData = userData;
        updateAuthUI();
        if (role === 'teacher') {
            navigate('teacher');
            showToast(`Аккаунт создан! Ваш код: ${userData.teacherCode}`);
        } else {
            navigate('dashboard');
            showToast('Аккаунт создан!' + (teacherUid ? ' Вы привязаны к преподавателю.' : ''));
        }
    } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false; btn.textContent = 'Зарегистрироваться';
    }
}

const _cardCountCache = {};
async function loadCardStudentCount(courseId) {
    if (_cardCountCache[courseId] !== undefined) {
        document.querySelectorAll('.card-student-count-'+courseId).forEach(el => el.textContent = _cardCountCache[courseId]);
        return;
    }
    try {
        const doc = await db.collection('courseStats').doc(courseId).get();
        const count = doc.exists ? (doc.data().count || 0) : 0;
        _cardCountCache[courseId] = count;
        document.querySelectorAll('.card-student-count-'+courseId).forEach(el => el.textContent = count);
    } catch(e) {
        document.querySelectorAll('.card-student-count-'+courseId).forEach(el => el.textContent = '0');
    }
}

async function loadCourseRealStudents(courseId) {

        // Update all elements showing student count for this course

        const el = document.getElementById('courseStudentCount_' + courseId);

function getCourseProgress(courseId) {
    if (!currentUser) return 0;
    const c = COURSES.find(x => x.id === courseId);
    if (!c) return 0;
    const done = c.lessons.filter(l => isLessonDone(courseId, l.id)).length;
    return Math.round(done / c.lessons.length * 100);
}
function isLessonDone(courseId, lessonId) {
    try { return localStorage.getItem(`done_${currentUser?.uid}_${courseId}_${lessonId}`) === '1'; } catch(e) { return false; }
}
function markLessonDone(courseId, lessonId) {
    try { localStorage.setItem(`done_${currentUser?.uid}_${courseId}_${lessonId}`, '1'); } catch(e) {}
}

function selectLessonAnswer(qi, ai) {
    if (lessonQuizState.submitted) return;
    lessonQuizState.answers[qi] = ai;
    // Clear others in this question
    document.querySelectorAll(`[id^="opt_${qi}_"]`).forEach(el => el.classList.remove('selected'));
    document.getElementById(`opt_${qi}_${ai}`)?.classList.add('selected');
    // Enable submit if all answered
    const allAnswered = lessonQuizState.answers.every(a => a !== null);
    const btn = document.getElementById('quizSubmitBtn');
    if (btn) btn.disabled = !allAnswered;
}

function submitLessonQuiz(courseId, lessonId) {
    const quiz = currentLessonQuiz;
    if (lessonQuizState.submitted || !quiz || !quiz.length) return;
    lessonQuizState.submitted = true;
    let correct = 0;
    const wrongTopics = [];
    quiz.forEach((q, qi) => {
        const userAns = lessonQuizState.answers[qi];
        const isCorrect = userAns === q.correct;
        if (isCorrect) correct++;
        else wrongTopics.push({ q: q.q, correctAnswer: q.answers[q.correct], yourAnswer: userAns !== null ? q.answers[userAns] : 'Не отвечено' });
        document.querySelectorAll(`[id^="opt_${qi}_"]`).forEach(el => {
            el.style.pointerEvents = 'none';
        });
        const correctEl = document.getElementById(`opt_${qi}_${q.correct}`);
        if (correctEl) correctEl.classList.add('correct');
        if (userAns !== null && userAns !== q.correct) {
            const wrongEl = document.getElementById(`opt_${qi}_${userAns}`);
            if (wrongEl) wrongEl.classList.add('wrong');
        }
    });
    const pct = Math.round(correct / quiz.length * 100);
    const resultEl = document.getElementById('quizResult');
    const submitBtn = document.getElementById('quizSubmitBtn');
    if (submitBtn) submitBtn.style.display = 'none';
    if (resultEl) {
        resultEl.classList.remove('hidden');
        const color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--danger)';
        const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
        const grade = pct >= 90 ? 'Отлично!' : pct >= 80 ? 'Хорошо!' : pct >= 60 ? 'Удовлетворительно' : 'Нужно повторить';
        resultEl.innerHTML = `
            <div class="p-6 rounded-xl mb-4" style="background:#F8F9FA;border:2px solid ${color};">
                <div class="flex items-center gap-4 mb-4">
                    <div style="width:56px;height:56px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">
                        ${emoji}
                    </div>
                    <div>
                        <div class="font-bold text-xl" style="color:${color}">${pct}% — ${grade}</div>
                        <div class="text-sm mt-1" style="color:var(--text-light)">Правильных ответов: ${correct} из ${quiz.length}</div>
                    </div>
                    <div class="ml-auto text-right hidden md:block">
                        <div style="font-size:36px;font-weight:800;color:${color};">${pct}%</div>
                    </div>
                </div>
                <!-- Progress bar -->
                <div class="progress-bar-wrap mb-3"><div class="progress-bar-fill" style="width:${pct}%;background:${color};"></div></div>
                ${pct < 100 && wrongTopics.length ? `
                <div class="mt-4">
                    <div class="font-semibold text-sm mb-2" style="color:var(--text)">❌ Ошибки (что нужно повторить):</div>
                    ${wrongTopics.map(w=>`
                    <div class="p-3 rounded-lg mb-2" style="background:#FDEDEC;border-left:3px solid var(--danger);">
                        <div class="text-sm font-medium mb-1" style="color:var(--text)">${escapeHtml(w.q)}</div>
                        <div class="text-xs" style="color:var(--danger)">Ваш ответ: ${escapeHtml(w.yourAnswer)}</div>
                        <div class="text-xs" style="color:var(--success)">Правильно: ${escapeHtml(w.correctAnswer)}</div>
                    </div>`).join('')}
                </div>` : pct === 100 ? '<div class="mt-3 p-3 rounded-lg" style="background:#EAFAF1;"><span style="color:var(--success);font-size:14px;">🎉 Идеальный результат! Все вопросы решены верно!</span></div>' : ''}
            </div>
        `;
        // AI Analysis block
        const aiBlock = document.getElementById('aiAnalysisBlock');
        if (aiBlock && wrongTopics.length > 0) {
            aiBlock.classList.remove('hidden');
            aiBlock.innerHTML = `
            <div class="p-5 rounded-xl mb-4" style="background:linear-gradient(135deg,#EBF5FB,#E8F8F5);border:1px solid var(--border);">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fas fa-robot" style="color:var(--accent);"></i>
                    <span class="font-bold text-sm" style="color:var(--primary)">ИИ-анализ результата</span>
                    <span id="aiAnalysisStatus" class="text-xs" style="color:var(--text-light)">Формирую рекомендации...</span>
                </div>
                <div id="aiAnalysisText" style="font-size:14px;line-height:1.7;color:var(--text);white-space:pre-line;">
                    <i class="fas fa-spinner fa-spin" style="color:var(--secondary)"></i>
                </div>
            </div>`;
            generateAIAnalysis(pct, correct, quiz.length, wrongTopics, courseId, lessonId);
        }
    }
    // Save progress always (not just >=60), mark done only if passed
    saveResultToFirebase(courseId, lessonId, pct, correct, quiz.length);
    if (pct >= 60) markLessonDone(courseId, lessonId);
}

async function generateAIAnalysis(pct, correct, total, wrongTopics, courseId, lessonId) {
    const course = COURSES.find(c => c.id === courseId);
    const lesson = course?.lessons.find(l => l.id === lessonId);
    const prompt = `Ученик прошёл тест по теме "${lesson?.title || 'урок'}" (курс: "${course?.title || courseId}").
Результат: ${correct} из ${total} правильных (${pct}%).
${wrongTopics.length > 0 ? `Допущены ошибки в вопросах:\n${wrongTopics.map(w=>`- Вопрос: "${w.q}" | Ответил: "${w.yourAnswer}" | Верно: "${w.correctAnswer}"`).join('\n')}` : 'Все ответы верные!'}

Дай короткий (3-5 предложений) персональный анализ на русском языке:
1. Общая оценка результата
2. Конкретно какие темы нужно повторить и почему (по ошибкам)
3. Практический совет как улучшить знания по этим темам
Пиши дружелюбно, как учитель ученику. Без лишних заголовков.`;
    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 1000,
                messages: [{ role: "user", content: prompt }]
            })
        });
        const data = await response.json();
        const text = data.content?.[0]?.text || 'Анализ недоступен.';
        const statusEl = document.getElementById('aiAnalysisStatus');
        const textEl = document.getElementById('aiAnalysisText');
        if (statusEl) statusEl.textContent = '';
        if (textEl) textEl.textContent = text;
    } catch(e) {
        const textEl = document.getElementById('aiAnalysisText');
        if (textEl) textEl.textContent = wrongTopics.length > 0
            ? `Рекомендуем повторить: ${wrongTopics.map(w=>w.q).join('; ')}. Перечитайте теорию урока.`
            : 'Отличная работа! Продолжайте в том же духе.';
        const statusEl = document.getElementById('aiAnalysisStatus');
        if (statusEl) statusEl.textContent = '';
    }
}

async function saveResultToFirebase(courseId, lessonId, score, correct, total) {
    if (!currentUser) return;
    try {
        const course = COURSES.find(c => c.id === courseId);
        const lesson = course?.lessons.find(l => l.id === lessonId);

        // Always re-read the student's own profile from Firestore so we get
        // the correct teacherUid even if the in-memory cache was stale/null.
        let teacherUid = currentUserData?.teacherUid || null;
        if (!teacherUid) {
            try {
                const uDoc = await db.collection('users').doc(currentUser.uid).get();
                if (uDoc.exists) {
                    const fresh = uDoc.data();
                    teacherUid = fresh.teacherUid || null;
                    // Update the in-memory cache so subsequent saves are also correct
                    if (!currentUserData) currentUserData = fresh;
                    else currentUserData.teacherUid = teacherUid;
                }
            } catch(e) { console.warn('Could not refresh user profile:', e); }
        }

        await db.collection('results').add({
            userId: currentUser.uid,
            teacherUid: teacherUid,
            courseId, lessonId, score, correct, total,
            courseTitle: course?.title || courseId,
            lessonTitle: lesson?.title || lessonId,
            passed: score >= 60,
            date: new Date().toISOString()
        });
        // Update user enrollment count for this course
        const enrollRef = db.collection('enrollments').doc(`${currentUser.uid}_${courseId}`);
        await enrollRef.set({ userId: currentUser.uid, courseId, enrolledAt: new Date().toISOString() }, { merge: true });
        // Update course real student count in Firestore
        const courseRef = db.collection('courseStats').doc(courseId);
        await db.runTransaction(async t => {
            const doc = await t.get(courseRef);
            const current = doc.exists ? (doc.data().students || []) : [];
            if (!current.includes(currentUser.uid)) {
                t.set(courseRef, { students: [...current, currentUser.uid], count: current.length + 1 }, { merge: true });
            }
        });
    } catch(e) { console.error('Save result error:', e); }
}

let teacherData = { students: [], results: [] };

async function renderTeacherDashboard() {
    if (!currentUser) { navigate('login'); return; }
    const app = document.getElementById('appContainer');
    app.innerHTML = `<div class="p-12 text-center"><i class="fas fa-spinner fa-spin text-2xl" style="color:var(--secondary)"></i></div>`;

    // Make sure we actually have the teacher's profile loaded
    if (!currentUserData) {
        try {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) currentUserData = doc.data();
        } catch(e) {}
    }
    if (currentUserData?.role !== 'teacher') { navigate('dashboard'); return; }

    const studentUids = currentUserData.students || [];
    teacherData.students = [];
    teacherData.results = [];

    try {
        // Load student profiles (allowed by rules: teacher can read profiles where teacherUid == their uid)
        if (studentUids.length) {
            const studentDocs = await Promise.all(studentUids.map(uid => db.collection('users').doc(uid).get()));
            studentDocs.forEach(d => {
                if (d.exists) {
                    teacherData.students.push({ ...d.data(), uid: d.id, id: d.id });
                }
            });
        }

        // Load results by teacherUid — this is the correct query allowed by Firestore rules:
        //   allow read: if resource.data.teacherUid == request.auth.uid
        // Using 'userId in [...]' would be rejected because the rule checks per-document
        // and the teacher's uid !== the student's userId stored in each result document.
        const resultsSnap = await db.collection('results')
            .where('teacherUid', '==', currentUser.uid)
            .get();
        resultsSnap.forEach(d => teacherData.results.push({ id: d.id, ...d.data() }));

    } catch(e) { console.error('Teacher data load error:', e); }

    const totalStudents = teacherData.students.length;
    const totalTests = teacherData.results.length;
    const avgScore = totalTests ? Math.round(teacherData.results.reduce((s,r)=>s+(r.score||0),0)/totalTests) : 0;
    const subjectLabels = { math:'Математика', russian:'Русский язык', physics:'Физика', chemistry:'Химия', biology:'Биология', history:'История', english:'Английский язык', cs:'Информатика', geography:'География', literature:'Литература', all:'Все предметы' };

    app.innerHTML = `
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold" style="color:var(--primary)">Кабинет преподавателя</h1>
                <p style="color:var(--text-light)">${escapeHtml(currentUserData.name || '')}${currentUserData.subject ? ' · ' + escapeHtml(subjectLabels[currentUserData.subject] || currentUserData.subject) : ''}</p>
            </div>
            <div class="card p-4 flex items-center gap-4" style="background:#EBF5FB;border:1px dashed var(--secondary);">
                <div>
                    <div class="text-xs" style="color:var(--text-light)">Код для учеников</div>
                    <div class="text-xl font-bold" style="color:var(--secondary);letter-spacing:2px;">${escapeHtml(currentUserData.teacherCode || '—')}</div>
                </div>
                <button onclick="copyTeacherCode()" class="btn-outline btn-sm"><i class="fas fa-copy mr-1"></i>Скопировать</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            ${[
                {icon:'fa-user-graduate',c:'#EBF5FB',ic:'var(--secondary)',l:'Учеников',v:totalStudents},
                {icon:'fa-tasks',c:'#EAFAF1',ic:'var(--success)',l:'Тестов сдано',v:totalTests},
                {icon:'fa-chart-bar',c:'#FEF9E7',ic:'var(--warning)',l:'Средний балл',v:avgScore+'%'},
                {icon:'fa-book',c:'#FDF2F8',ic:'#8E44AD',l:'Предмет',v:subjectLabels[currentUserData.subject] || currentUserData.subject || '—'},
            ].map(s=>`
            <div class="card p-5">
                <div class="stat-icon mb-3" style="background:${s.c};"><i class="fas ${s.icon}" style="color:${s.ic};font-size:18px;"></i></div>
                <div class="text-2xl font-bold" style="color:var(--primary)">${s.v}</div>
                <div class="text-xs mt-1" style="color:var(--text-light)">${s.l}</div>
            </div>`).join('')}
        </div>

        <div class="card overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center" style="border-color:var(--border)">
                <h3 class="font-bold">Мои ученики (${totalStudents})</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead><tr><th>Имя</th><th>Email</th><th>Класс</th><th>Тестов</th><th>Средний балл</th><th>Действия</th></tr></thead>
                    <tbody>
                        ${totalStudents ? teacherData.students.map(s => {
                            const studentId = s.uid || s.id;
                            const sr = teacherData.results.filter(r=>r.userId===studentId);
                            const savg = sr.length ? Math.round(sr.reduce((a,r)=>a+(r.score||0),0)/sr.length) : 0;
                            return `<tr>
                                <td class="font-medium">${escapeHtml(s.name||'—')}</td>
                                <td style="color:var(--text-light)">${escapeHtml(s.email||'—')}</td>
                                <td><span class="badge badge-dark">${s.grade || '—'} кл.</span></td>
                                <td><span class="font-bold">${sr.length}</span></td>
                                <td><span class="font-bold" style="color:${savg>=80?'var(--success)':savg>=60?'var(--warning)':'var(--danger)'}">${sr.length?savg+'%':'—'}</span></td>
                                <td><button onclick="viewStudentDetailTeacher('${s.uid || s.id}')" class="text-sm" style="color:var(--secondary);background:transparent;border:none;cursor:pointer;"><i class="fas fa-eye"></i> Детали</button></td>
                            </tr>`;
                        }).join('') : `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-user-graduate"></i><p>Пока нет учеников. Поделитесь кодом «${escapeHtml(currentUserData.teacherCode||'—')}», чтобы ученики могли присоединиться при регистрации.</p></div></td></tr>`}
                    </tbody>
                </table>
            </div>
        </div>
    </div>`;
}

function copyTeacherCode() {
    const code = currentUserData?.teacherCode;
    if (!code) return;
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(code).then(()=>showToast('Код скопирован!')).catch(()=>showToast('Не удалось скопировать код'));
    } else {
        showToast('Код: ' + code);
    }
}

function viewStudentDetailTeacher(uid) {
    const s = teacherData.students.find(x=>(x.uid===uid||x.id===uid));
    if (!s) return;
    const sr = teacherData.results.filter(r=>r.userId===uid);
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.innerHTML = `
    <div class="card p-7" style="max-width:500px;width:100%;">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold">${escapeHtml(s.name||'—')}</h2>

        </div>
        <div class="mb-4 p-4 rounded-lg" style="background:var(--bg)">
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div><span style="color:var(--text-light)">Email:</span><br><strong>${escapeHtml(s.email||'—')}</strong></div>
                <div><span style="color:var(--text-light)">Класс:</span><br><strong>${s.grade||'—'}</strong></div>
            </div>
        </div>
        <h3 class="font-bold mb-3">Последние результаты</h3>
        <div class="space-y-2 overflow-y-auto" style="max-height:250px;">
            ${sr.slice().reverse().slice(0,10).map(r=>{

    document.body.appendChild(modal);

async function exportResults() {
    const rows = [['Ученик','Email','Курс','Урок','Балл','Правильных','Всего','Дата']];
    adminData.results.forEach(r => {
        const u = adminData.users.find(x=>x.uid===r.userId);
        rows.push([u?.name||'—', u?.email||'—', r.courseTitle||r.courseId, r.lessonTitle||r.lessonId, r.score||0, r.correct||0, r.total||0, new Date(r.date).toLocaleString('ru-RU')]);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'eduai_results_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
    showToast('Экспорт скачан');
}

    if (!confirm('Сбросить счётчики записавшихся на курсы?')) return;
    try {
        const snap = await db.collection('courseStats').get();
        const batch = db.batch(); snap.forEach(d=>batch.delete(d.ref));
        await batch.commit(); showToast('Счётчики сброшены');

}
async function changeAdminPassword() {

    try { await currentUser.updatePassword(pass); showToast('Пароль изменён'); }

}

async function deleteUser(uid) {
    if (!confirm('Удалить пользователя и все его результаты?')) return;
    try {
        const snap = await db.collection('results').where('userId','==',uid).get();
        const batch = db.batch();
        snap.forEach(d=>batch.delete(d.ref));
        await batch.commit();
        await db.collection('users').doc(uid).delete();
        showToast('Пользователь удалён');
        await loadAdminData();
    } catch(e) { showToast('Ошибка: '+e.message); }
}

async function resetAllData() {
    if (!confirm('УДАЛИТЬ ВСЕХ пользователей и результаты? Это необратимо!')) return;
    try {
        const users = await db.collection('users').get();
        const batch = db.batch();
        users.forEach(d=>{ if(d.data().email!=='admin@eduaipro.com') batch.delete(d.ref); });
        const res = await db.collection('results').get();
        res.forEach(d=>batch.delete(d.ref));
        await batch.commit();
        showToast('Данные сброшены');
        await loadAdminData();
    } catch(e) { showToast('Ошибка: '+e.message); }
}

let chatOpen = false;

function toggleChat() {
    chatOpen = !chatOpen;
    const win = document.getElementById('chatWindow');
    if (chatOpen) {
        win.classList.add('open');
        if (!chatHistory.length) addBotMessage('Привет! Я ИИ-помощник EduAI. Задай любой вопрос по школьным предметам — объясню понятно и с примерами. 📚');
    } else {
        win.classList.remove('open');
    }
}

function clearChat() {
    chatHistory = [];
    document.getElementById('chatMessages').innerHTML = '';
    addBotMessage('История очищена. Чем могу помочь?');
}

function addBotMessage(text) {
    const el = document.createElement('div');
    el.className = 'chat-msg bot';
    el.textContent = text;
    const container = document.getElementById('chatMessages');
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}
function addUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'chat-msg user';
    el.textContent = text;
    const container = document.getElementById('chatMessages');
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}
function addThinkingIndicator() {
    const el = document.createElement('div');
    el.className = 'chat-msg thinking';
    el.id = 'thinkingIndicator';
    el.textContent = 'ИИ думает...';
    const container = document.getElementById('chatMessages');
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}
function removeThinkingIndicator() {
    document.getElementById('thinkingIndicator')?.remove();
}

async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addUserMessage(text);
    chatHistory.push({ role: 'user', content: text });
    addThinkingIndicator();

    try {
        // ⚠️ ВАЖНО: замени на свой API-ключ OpenRouter
        const API_KEY = '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';
        
        // 🎯 Выбери модель для школы:
        const MODEL = 'deepseek/deepseek-v3.1-terminus'; // Рекомендую для образования
        
        // ИСПРАВЛЕННЫЙ ЗАПРОС К OPENROUTER (не Gemini!)
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`,
                'HTTP-Referer': window.location.origin,
                'X-Title': 'EduAI'
            },
            body: JSON.stringify({
                model: MODEL,
                messages: [
                    {
                        role: 'system',
                        content: 'Ты — ИИ-помощник образовательной платформы EduAI для школьников 5-11 класса. Отвечай по-русски, ясно и структурированно. Используй примеры и пошаговые объяснения. Не давай слишком длинных ответов — максимум 3-4 абзаца или список.'
                    },
                    ...chatHistory
                ],
                temperature: 0.7,
                max_tokens: 800,
                top_p: 0.95
            })
        });

        const data = await response.json();
        removeThinkingIndicator();

        // Проверка на ошибки OpenRouter
        if (data.error) {
            console.error('OpenRouter Error:', data.error);
            if (data.error.code === 402) {
                addBotMessage('⚠️ Недостаточно средств на балансе OpenRouter. Пополните счет или используйте бесплатный тестовый ключ.');
            } else if (data.error.code === 401) {
                addBotMessage('⚠️ Неверный API-ключ. Проверьте ключ OpenRouter.');
            } else {
                addBotMessage(`❌ Ошибка: ${data.error.message || 'Неизвестная ошибка'}`);
            }
            return;
        }

        const reply = data?.choices?.[0]?.message?.content || 
                      'Не удалось получить ответ от ИИ. Попробуйте переформулировать вопрос.';
        
        chatHistory.push({ role: 'assistant', content: reply });
        addBotMessage(reply);

        // Сохраняем в Firestore
        if (currentUser) {
            try {
                await db.collection('chatHistory').add({
                    userId: currentUser.uid,
                    message: text,
                    response: reply,
                    model: MODEL,
                    timestamp: new Date().toISOString()
                });
            } catch(e) {}
        }

    } catch(err) {
        removeThinkingIndicator();
        console.error('Chat error:', err);
        addBotMessage('⚠️ Ошибка соединения. Проверьте интернет и попробуйте снова.');
    }
}
